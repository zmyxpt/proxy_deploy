services:
  caddy:
    image: caddy
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Volumes/caddyconf:/etc/caddy
      - ./Volumes/caddydata:/data
    restart: always
    networks:
      - proxy

  warp:
    image: cloudflare-warp
    build:
      context: docker
      dockerfile: warp.Dockerfile
    container_name: warp
    mem_reservation: 128m
    mem_limit: 320m
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./Volumes/warp:/var/lib/cloudflare-warp
    restart: always
    networks:
      - proxy

  shadowsocks-direct:
    image: shadowsocks
    build:
      context: docker
      dockerfile: shadowsocks.Dockerfile
    container_name: shadowsocks-direct
    volumes:
      - ./Volumes/shadowsocks-direct:/etc/shadowsocks-rust
    restart: always
    networks:
      - proxy

  shadowsocks-warp:
    image: shadowsocks
    build:
      context: docker
      dockerfile: shadowsocks.Dockerfile
    container_name: shadowsocks-warp
    user: "65534:65534"
    network_mode: service:warp
    volumes:
      - ./Volumes/shadowsocks-warp:/etc/shadowsocks-rust
    restart: always
    depends_on:
      - warp

  gost-direct:
    image: gogost/gost
    container_name: gost-direct
    entrypoint: ["gost"]
    command: ["-C", "/etc/gost/gost.yaml"]
    volumes:
      - ./Volumes/gost-direct:/etc/gost
    restart: always
    networks:
      - proxy

  gost-warp:
    image: gogost/gost
    container_name: gost-warp
    user: "65534:65534"
    entrypoint: ["gost"]
    command: ["-C", "/etc/gost/gost.yaml"]
    network_mode: service:warp
    volumes:
      - ./Volumes/gost-warp:/etc/gost
    restart: always
    depends_on:
      - warp

networks:
  proxy:
