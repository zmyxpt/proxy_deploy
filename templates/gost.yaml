services:
  - name: direct
    addr: ":9000"
    handler:
      type: socks5
      auth:
        username: "__SOCKS_USERNAME__"
        password: "__SOCKS_PASSWORD__"
    listener:
      metadata.path: "/"
      type: ws

  - name: warp
    addr: ":9001"
    handler:
      type: socks5
      chain: warp-chain
      auth:
        username: "__SOCKS_USERNAME__"
        password: "__SOCKS_PASSWORD__"
    listener:
      metadata.path: "/"
      type: ws

chains:
  - name: warp-chain
    hops:
      - name: warp-hop
        nodes:
          - name: warp-proxy
            addr: "warp:40000"
            connector:
              type: socks5
            dialer:
              type: tcp
